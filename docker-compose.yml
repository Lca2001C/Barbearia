services:
  postgres:
    image: postgres:16-alpine
    container_name: barbearia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-barbearia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-barbearia123}
      POSTGRES_DB: ${DB_NAME:-barbearia}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-barbearia}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: barbearia_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-barbearia}:${DB_PASSWORD:-barbearia123}@postgres:5432/${DB_NAME:-barbearia}?schema=public
      PORT: 3333
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: barbearia_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3333/api
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next_cache:
