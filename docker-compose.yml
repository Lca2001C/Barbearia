services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-barbearia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-barbearia123}
      POSTGRES_DB: ${DB_NAME:-barbearia}
    ports:
      - "${DB_PORT:-5434}:5432"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-barbearia}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-barbearia}:${DB_PASSWORD:-barbearia123}@postgres:5432/${DB_NAME:-barbearia}?schema=public
      PORT: ${APP_BACKEND_PORT:-3335}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://localhost:8443}
      FRONTEND_URL: ${APP_URL:-https://localhost:8443}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    expose:
      - "${APP_BACKEND_PORT:-3335}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://localhost:8443/api}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    expose:
      - "3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    networks:
      - app_net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${APP_HTTP_PORT:-8080}:80"
      - "${APP_HTTPS_PORT:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app_net

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next_cache:
  caddy_data:
  caddy_config:

networks:
  app_net:
    driver: bridge
