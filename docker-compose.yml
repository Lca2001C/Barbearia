services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-barbearia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-barbearia123}
      POSTGRES_DB: ${DB_NAME:-barbearia}
    ports:
      - "${DB_PORT:-5548}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-barbearia}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-barbearia}:${DB_PASSWORD:-barbearia123}@postgres:5432/${DB_NAME:-barbearia}?schema=public
      PORT: ${APP_BACKEND_PORT:-3335}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://localhost:8446}
      FRONTEND_URL: ${APP_URL:-https://localhost:8446}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
    expose:
      - "${APP_BACKEND_PORT:-3335}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://localhost:8446/api}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://localhost:8446/api}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - app_net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${APP_HTTP_PORT:-8083}:80"
      - "${APP_HTTPS_PORT:-8446}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app_net

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  app_net:
    driver: bridge
